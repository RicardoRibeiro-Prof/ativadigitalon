<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Altura Motors | Admin CRM</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Manrope:wght@600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="admin.css">
</head>
<body>
<section class="login" id="loginScreen"><form class="login-card" onsubmit="login(event)"><div class="logo">ALTURA <span>MOTORS</span></div><h1>Admin & CRM</h1><p>Ambiente demonstrativo para gestão do estoque, leads e vendas.</p><div class="field"><label>E-mail</label><input id="loginEmail" type="email" value="admin@alturamotros.com" required></div><div class="field"><label>Senha</label><input id="loginPassword" type="password" value="123456" required></div><button class="primary">Entrar</button><p style="text-align:center">Acesso demonstrativo: qualquer e-mail e senha.</p></form></section>
<div class="app hidden" id="app">
<aside class="sidebar"><div class="logo">ALTURA <span>MOTORS</span></div><button class="nav-btn active" data-page="dashboard" onclick="goPage('dashboard',this)">Dashboard</button><button class="nav-btn" data-page="vehicles" onclick="goPage('vehicles',this)">Veículos</button><button class="nav-btn" data-page="leads" onclick="goPage('leads',this)">CRM / Leads</button><button class="nav-btn" data-page="sales" onclick="goPage('sales',this)">Vendas</button><div class="side-bottom"><button class="nav-btn" onclick="logout()">Sair</button></div></aside>
<main class="main"><header class="topbar"><div><b id="topTitle">Dashboard</b><br><small>Gestão Altura Motors</small></div><a class="secondary" href="index.html" target="_blank">Abrir site público</a></header><div class="content" id="pageContent"></div></main>
</div>
<div class="modal" id="vehicleModal"><form class="modal-box" onsubmit="saveVehicle(event)"><div class="modal-head"><h2 id="vehicleModalTitle">Novo veículo</h2><button type="button" class="mini" onclick="closeModal('vehicleModal')">Fechar</button></div><input id="vehicleId" type="hidden"><div class="form-grid"><input id="vmMarca" placeholder="Marca" required><input id="vmModelo" placeholder="Modelo" required><input id="vmVersao" placeholder="Versão" required><input id="vmAno" placeholder="Ano" required><input id="vmKm" type="number" placeholder="Quilometragem" required><input id="vmPreco" type="number" placeholder="Preço" required><select id="vmCategoria"><option>SUV</option><option>Sedan</option><option>Picape</option><option>Hatch</option></select><select id="vmStatus"><option>Disponível</option><option>Reservado</option><option>Vendido</option></select><input class="full" id="vmFoto" placeholder="URL da foto principal" required><textarea class="full" id="vmDescricao" placeholder="Descrição"></textarea></div><div class="modal-actions"><button type="button" class="secondary" onclick="closeModal('vehicleModal')">Cancelar</button><button class="primary">Salvar</button></div></form></div>
<div class="modal" id="leadModal"><form class="modal-box" onsubmit="saveLead(event)"><div class="modal-head"><h2 id="leadModalTitle">Novo lead</h2><button type="button" class="mini" onclick="closeModal('leadModal')">Fechar</button></div><input id="leadId" type="hidden"><div class="form-grid"><input id="lmNome" placeholder="Nome" required><input id="lmTelefone" placeholder="Telefone" required><input id="lmEmail" type="email" placeholder="E-mail"><select id="lmStatus"><option>Novo</option><option>Em atendimento</option><option>Proposta enviada</option><option>Negociação</option><option>Vendido</option><option>Perdido</option></select><select id="lmVeiculo"></select><input id="lmVendedor" placeholder="Vendedor" required><input id="lmOrigem" placeholder="Origem: WhatsApp, Instagram..."><input id="lmData" type="date" required><textarea class="full" id="lmObs" placeholder="Observações"></textarea></div><div class="modal-actions"><button type="button" class="secondary" onclick="closeModal('leadModal')">Cancelar</button><button class="primary">Salvar lead</button></div></form></div>
<div class="modal" id="saleModal"><form class="modal-box" onsubmit="saveSale(event)"><div class="modal-head"><h2>Registrar venda</h2><button type="button" class="mini" onclick="closeModal('saleModal')">Fechar</button></div><input id="saleId" type="hidden"><div class="form-grid"><select id="smVehicle" required></select><input id="smCustomer" placeholder="Cliente" required><input id="smSeller" placeholder="Vendedor" required><input id="smDate" type="date" required><input id="smValue" type="number" placeholder="Valor da venda" required><select id="smPayment"><option>Financiamento</option><option>À vista</option><option>Troca + financiamento</option><option>Troca + à vista</option></select><textarea class="full" id="smNotes" placeholder="Observações"></textarea></div><div class="modal-actions"><button type="button" class="secondary" onclick="closeModal('saleModal')">Cancelar</button><button class="primary">Registrar venda</button></div></form></div>
<script src="admin.js"></script>
<script src="admin-sold-enhancement.js"></script>
</body></html>
